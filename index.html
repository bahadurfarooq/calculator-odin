<!DOCTYPE html>

    <title>ODIN CALCULATOR</title>

<body class="flex flex-col items-center">
<div id="display" class="w-100 p-4 m-5 text-right border-4 rounded-3xl border-amber-500 bg-amber-100 font-sans font-bold text-4xl text-amber-500">
  0
</div>

<div id="clac-buttons" class="grid grid-cols-4 gap-2 w-100 h-100 m-5 ">

<button class="w-20 h-20 border-4 rounded-3xl border-amber-500 bg-amber-100 font-sans font-bold text-4xl text-amber-500 order-9">1</button>
